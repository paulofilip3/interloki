nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/paulofilip3/interloki
  # Defaults to the chart appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  httpPort: 8080
  forwardPort: 24224

interloki:
  maxMessages: 10000
  bulkWindowMs: 100
  verbose: false
  s3:
    bucket: ""
    prefix: ""
    region: ""
    endpoint: ""
    flushInterval: "10s"
    flushCount: 1000

serviceAccount:
  # Set to true to create a ServiceAccount for the pod.
  # Useful for IRSA (IAM Roles for Service Accounts) on EKS.
  create: true
  # Annotations to add to the service account (e.g. EKS IRSA role ARN).
  annotations: {}
  # Override the generated service account name. Defaults to the fullname.
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
